<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/crystal.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sovereign Mesh Codex - Rebirth</title>
    <style>
      :root {
        --golden-accent: #FFD700;
        --dark-bg: #0a0a1a;
        --starlight: #e0e0ff;
      }
      body {
        background: var(--dark-bg);
        color: var(--starlight);
        font-family: 'Georgia', 'Times New Roman', serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }
      .loading-container {
        text-align: center;
      }
      .loading-text {
        font-size: 1.5rem;
        color: var(--golden-accent);
        text-shadow: 0 0 10px var(--golden-accent);
        animation: pulse-text 2s infinite alternate;
      }
      @keyframes pulse-text {
        from { opacity: 0.7; }
        to { opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="loading-container">
        <p class="loading-text">Entering the Sovereign Mesh...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
